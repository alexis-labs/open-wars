<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Open Wars</title>
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="Open Wars" />
    <meta name="apple-mobile-web-app-title" content="Open Wars" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f2" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212" />
    <meta content="/icon.svg" key="og-image" property="og:image" />
    <meta content="A local turn-based strategy game." key="description" name="description" />
    <meta content="Open Wars" key="og-title" property="og:title" />
    <meta
      content="A local turn-based strategy game for web and mobile."
      key="og-description"
      property="og:description"
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" href="/fonts/AthenaNova.woff2" as="font" crossorigin type="font/woff2" />
    <style type="text/css">
      @font-face {
        font-display: swap;
        font-family: Athena;
        src: url('/fonts/AthenaNova.woff2');
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        height: 100vh;
        height: -webkit-fill-available;
        height: fill-available;
      }

      body {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        color: #111;
        font-family: Athena, ui-sans-serif, system-ui, sans-serif;
        font-size: 20px;
        font-weight: normal;
        line-height: 1em;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: pan-x pan-y;
        user-select: none;
      }

      div.background {
        background-image: url('./Background.png');
        bottom: 0;
        image-rendering: pixelated;
        left: -144px;
        overflow: hidden;
        pointer-events: none;
        position: fixed;
        right: -144px;
        top: -144px;
        transform: perspective(125px) rotateX(2deg);
        z-index: 0;
        zoom: 2;
      }

      @media (prefers-color-scheme: dark) {
        div.background {
          filter: invert(1);
        }
      }

      .boot-loader {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 12px;
        inset: 0;
        justify-content: center;
        pointer-events: none;
        position: fixed;
        text-align: center;
        z-index: 2;
      }

      .boot-loader__status {
        color: #586575;
        font-size: 14px;
        margin: 0;
      }

      .boot-loader__dots {
        display: flex;
        gap: 8px;
      }

      .boot-loader__dot {
        animation: boot-loader-bounce 1.5s infinite;
        background-color: #6fbf73;
        border-radius: 2px;
        height: 10px;
        width: 10px;
      }

      .boot-loader__dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .boot-loader__dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes boot-loader-bounce {
        0%,
        100% {
          background-color: #6fbf73;
          transform: translate3d(0, 3px, 0);
        }

        33% {
          background-color: #1f6f8b;
        }

        66% {
          background-color: #4a8f6f;
        }

        50% {
          transform: translate3d(0, -7px, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="background"></div>
    <div id="root">
      <div class="boot-loader" role="status" aria-live="polite">
        <div class="boot-loader__dots" aria-hidden="true">
          <span class="boot-loader__dot"></span>
          <span class="boot-loader__dot"></span>
          <span class="boot-loader__dot"></span>
        </div>
        <p class="boot-loader__status">Loading…</p>
      </div>
    </div>
    <script src="/index.tsx" type="module"></script>
  </body>
</html>
